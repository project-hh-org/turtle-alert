<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>거북이경보 — README</title>
  <meta name="description" content="거북이경보 프로젝트 README. 기능 소개, 기술 스택, 개발 히스토리, 빌드/배포 가이드." />
  <meta property="og:title" content="거북이경보 — README" />
  <meta property="og:description" content="거북이경보 프로젝트 README. 기능 소개, 기술 스택, 개발 히스토리, 빌드/배포 가이드." />
  <meta property="og:image" content="https://turtle-alert.project-hh.com/icon.png" />
  <meta property="og:type" content="article" />
  <link rel="icon" type="image/png" href="icon.png" />
  <style>
    :root {
      --bg: #0f1419;
      --bg-soft: #1a2028;
      --card: #1f2630;
      --border: #2d3642;
      --text: #e8eef5;
      --text-dim: #9aa5b1;
      --accent: #4ade80;
      --accent-hover: #22c55e;
      --warn: #fbbf24;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro KR", "Pretendard", "Apple SD Gothic Neo", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    /* Sticky top bar */
    .topbar {
      position: sticky; top: 0; z-index: 10;
      background: rgba(15, 20, 25, 0.85);
      backdrop-filter: saturate(180%) blur(12px);
      -webkit-backdrop-filter: saturate(180%) blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .topbar-inner {
      max-width: 920px;
      margin: 0 auto;
      padding: 14px 24px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px;
    }
    .brand {
      display: inline-flex; align-items: center; gap: 10px;
      color: var(--text); text-decoration: none; font-weight: 700;
      font-size: 15px;
    }
    .brand img { width: 24px; height: 24px; }
    .topbar nav { display: flex; gap: 18px; font-size: 14px; }
    .topbar nav a {
      color: var(--text-dim); text-decoration: none;
      transition: color 0.15s;
    }
    .topbar nav a:hover { color: var(--accent); }

    main {
      max-width: 920px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    /* README 마크다운 콘텐츠 스타일 */
    .readme h1, .readme h2, .readme h3, .readme h4, .readme h5, .readme h6 {
      letter-spacing: -0.01em;
      margin: 32px 0 14px;
      color: var(--text);
    }
    .readme h1 { font-size: 36px; font-weight: 800; margin-top: 0; }
    .readme h2 {
      font-size: 26px; font-weight: 700;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
      margin-top: 48px;
    }
    .readme h3 { font-size: 20px; font-weight: 700; }
    .readme h4 { font-size: 16px; font-weight: 600; color: var(--text-dim); }

    .readme p { color: var(--text-dim); margin: 12px 0; }
    .readme a { color: var(--accent); text-decoration: none; }
    .readme a:hover { color: var(--accent-hover); text-decoration: underline; }
    .readme strong { color: var(--text); font-weight: 700; }
    .readme em { color: var(--text); }

    .readme ul, .readme ol { margin: 12px 0 12px 24px; color: var(--text-dim); }
    .readme li { margin: 6px 0; }
    .readme li > p { margin: 4px 0; }

    .readme blockquote {
      margin: 16px 0;
      padding: 12px 16px;
      border-left: 3px solid var(--warn);
      background: rgba(251, 191, 36, 0.06);
      color: var(--text-dim);
      border-radius: 0 6px 6px 0;
    }
    .readme blockquote p { margin: 0; color: var(--text-dim); }

    .readme hr {
      border: 0;
      border-top: 1px solid var(--border);
      margin: 32px 0;
    }

    /* Code */
    .readme code, .readme pre {
      font-family: "SF Mono", Menlo, Consolas, monospace;
      font-size: 13px;
    }
    .readme code {
      background: var(--bg-soft);
      padding: 2px 6px;
      border-radius: 4px;
      color: var(--accent);
    }
    .readme pre {
      background: var(--bg-soft);
      border: 1px solid var(--border);
      padding: 14px 16px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 14px 0;
    }
    .readme pre code {
      background: none;
      padding: 0;
      color: var(--text);
    }

    /* Tables (GitHub은 markdown-accessiblity-table 으로 감싸므로 그것도 처리) */
    .readme markdown-accessiblity-table { display: block; overflow-x: auto; margin: 14px 0; }
    .readme table {
      border-collapse: collapse;
      width: 100%;
      font-size: 14px;
    }
    .readme th, .readme td {
      padding: 10px 14px;
      border: 1px solid var(--border);
      text-align: left;
    }
    .readme th {
      background: var(--card);
      color: var(--text);
      font-weight: 600;
    }
    .readme td { color: var(--text-dim); }

    /* Images */
    .readme img {
      max-width: 100%;
      height: auto;
      border-radius: 6px;
      margin: 12px 0;
    }

    /* GitHub 헤딩 앵커 아이콘은 안 보이게 */
    .readme .anchor, .readme svg.octicon-link { display: none; }

    /* Mobile */
    @media (max-width: 600px) {
      main { padding: 32px 18px 60px; }
      .readme h1 { font-size: 28px; }
      .readme h2 { font-size: 22px; margin-top: 36px; }
      .readme h3 { font-size: 17px; }
      .topbar nav { gap: 12px; font-size: 13px; }
      .topbar-inner { padding: 12px 18px; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="./">
        <img src="icon.png" alt="거북이경보" />
        <span>거북이경보</span>
      </a>
      <nav>
        <a href="./">홈</a>
        <a href="https://github.com/project-hh-org/turtle-alert" target="_blank" rel="noopener">GitHub</a>
        <a href="https://github.com/project-hh-org/turtle-alert/releases/latest" target="_blank" rel="noopener">릴리즈</a>
      </nav>
    </div>
  </header>

  <main>
    <article class="readme">
{{CONTENT}}
    </article>
  </main>
</body>
</html>
