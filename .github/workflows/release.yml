name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

      - name: Build DMGs (x64 + arm64)
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx electron-builder --mac --x64 --arm64 --publish never

      - name: Rename DMGs to version-less names
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p release
          cp "dist/TurtleAlert-${VERSION}-arm64.dmg" "release/TurtleAlert-arm64.dmg"
          cp "dist/TurtleAlert-${VERSION}.dmg"       "release/TurtleAlert-x64.dmg"
          ls -lh release/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$GITHUB_REF_NAME" > /dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists — uploading assets only"
            gh release upload "$GITHUB_REF_NAME" \
              release/TurtleAlert-arm64.dmg \
              release/TurtleAlert-x64.dmg \
              --clobber
          else
            gh release create "$GITHUB_REF_NAME" \
              release/TurtleAlert-arm64.dmg \
              release/TurtleAlert-x64.dmg \
              --title "거북이경보 ${GITHUB_REF_NAME}" \
              --generate-notes
          fi

      - name: Update Homebrew cask
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN not set — skipping cask update"
            exit 0
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          ARM_SHA="$(shasum -a 256 release/TurtleAlert-arm64.dmg | awk '{print $1}')"
          X64_SHA="$(shasum -a 256 release/TurtleAlert-x64.dmg   | awk '{print $1}')"

          TAP_DIR="$(mktemp -d)/homebrew-turtle-alert"
          git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/project-hh-org/homebrew-turtle-alert.git" "$TAP_DIR"

          CASK="$TAP_DIR/Casks/turtle-alert.rb"
          # cask 파일에서 version과 두 sha256(arm → intel 순)을 in-place 치환하고,
          # 노터라이즈 도입으로 더 이상 필요 없는 postflight(xattr 격리 해제) 블록과
          # 그 위의 ad-hoc 서명 주석을 제거한다. awk가 줄 단위로 처리하므로
          # YAML 들여쓰기/HEREDOC 이스케이프 이슈 없음.
          awk -v v="$VERSION" -v arm="$ARM_SHA" -v x64="$X64_SHA" '
            BEGIN { skip = 0 }
            # postflight do ... end 블록 통째로 스킵
            /^[[:space:]]*postflight[[:space:]]+do[[:space:]]*$/ { skip = 1; next }
            skip == 1 {
              if ($0 ~ /^[[:space:]]*end[[:space:]]*$/) { skip = 0 }
              next
            }
            # ad-hoc 서명 관련 주석 제거 (노터라이즈 후에는 의미 없음)
            /^[[:space:]]*#[[:space:]]*ad-hoc signed/ { next }
            # version 치환
            /^[[:space:]]*version[[:space:]]+"/ { sub(/"[^"]*"/, "\"" v "\""); print; next }
            # sha256 치환 (첫 번째 = arm64, 두 번째 = x64)
            /sha256[[:space:]]+"/ {
              sub(/"[0-9a-f]{64}"/, "\"" (++n == 1 ? arm : x64) "\"")
              print; next
            }
            { print }
          ' "$CASK" > "$CASK.new" && mv "$CASK.new" "$CASK"

          # 연속된 빈 줄 정리 (postflight 블록 제거 후 빈 줄이 두 개 이상 연속될 수 있음)
          awk 'BEGIN{blank=0} /^[[:space:]]*$/ { if(blank){next} blank=1; print; next } { blank=0; print }' "$CASK" > "$CASK.new" && mv "$CASK.new" "$CASK"

          cd "$TAP_DIR"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/turtle-alert.rb
          if git diff --cached --quiet; then
            echo "Cask already up to date — nothing to commit"
          else
            git commit -m "feat: bump turtle-alert cask to v${VERSION}"
            git push origin main
          fi
